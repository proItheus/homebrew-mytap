name: Auto-merge autobump PRs

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
  check_suite:
    types: [completed]

permissions:
  contents: read

jobs:
  automerge:
    if: |
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'autobump')) ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
    steps:
      - name: Find autobump PRs
        id: find-prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "prs=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            prs=$(gh pr list --label autobump --state open --json number --jq '[.[].number] | join(",")')
            echo "prs=$prs" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve and enable auto-merge
        if: steps.find-prs.outputs.prs != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          IFS=',' read -ra PRS <<< "${{ steps.find-prs.outputs.prs }}"
          for pr in "${PRS[@]}"; do
            gh pr review "$pr" --approve
            gh pr merge "$pr" --auto --merge
          done
